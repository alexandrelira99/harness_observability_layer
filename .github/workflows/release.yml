name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build twine
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"
      - name: Build distributions
        run: |
          python -m build
      - name: Verify distribution files exist
        run: |
          ls -1 dist/
          test -f dist/harness_observability_layer-*.tar.gz
          test -f dist/harness_observability_layer-*.whl
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: hol-dist
          path: dist/*
      - name: Check distributions
        run: |
          python -m twine check dist/*
      - name: Generate artifact hashes
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          dist = Path("dist")
          output = dist / "SHA256SUMS"
          lines = []
          for path in sorted(p for p in dist.iterdir() if p.is_file() and p.name != "SHA256SUMS"):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")
          output.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(output.read_text(encoding="utf-8"))
          PY
      - name: Upload release hashes
        uses: actions/upload-artifact@v4
        with:
          name: hol-release-hashes
          path: dist/SHA256SUMS
      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*
